name: Waka Readme

on:
  schedule:
    # Runs at midnight every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # The exact metrics you want to track
          SHOW_EDITORS: "True"          # Shows Unity, VS Code, Blender, etc.
          SHOW_DAYS_OF_WEEK: "True"     # Shows which days you are most productive
          SHOW_PROFILE_VIEWS: "False"   # Hides profile views to keep it focused
          SHOW_OS: "False"              # Hides operating system
          SHOW_PROJECTS: "False"        # Set to True if you want to show specific game titles
          SHOW_TIMEZONE: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
